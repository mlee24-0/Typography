<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文字旋转图形生成器</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

h1{
margin-top:20px;
}

.controls{
margin:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

input,select{
padding:6px 10px;
border-radius:6px;
border:none;
}

canvas{
background:#000;
border-radius:10px;
}

</style>
</head>

<body>

<h1>🌀 文字旋转图形生成器</h1>

<div class="controls">

<input id="text" value="汉" placeholder="输入文字">

<label>数量</label>
<input id="count" type="number" value="40" min="5" max="200">

<label>半径</label>
<input id="radius" type="range" min="50" max="300" value="150">

<label>字体大小</label>
<input id="size" type="range" min="10" max="80" value="30">

<select id="mode">
<option value="circle">圆形旋转</option>
<option value="spiral">螺旋</option>
<option value="wave">波浪</option>
<option value="flower">花形</option>
</select>

</div>

<canvas id="canvas" width="600" height="600"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let angle=0

function draw(){

const text=document.getElementById("text").value
const count=parseInt(document.getElementById("count").value)
const radius=parseInt(document.getElementById("radius").value)
const size=parseInt(document.getElementById("size").value)
const mode=document.getElementById("mode").value

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.textAlign="center"
ctx.textBaseline="middle"
ctx.font=size+"px serif"

let cx=canvas.width/2
let cy=canvas.height/2

for(let i=0;i<count;i++){

let a=i/count*Math.PI*2+angle

let x,y

if(mode==="circle"){

x=cx+Math.cos(a)*radius
y=cy+Math.sin(a)*radius

}

if(mode==="spiral"){

let r=radius*(i/count)
x=cx+Math.cos(a)*r
y=cy+Math.sin(a)*r

}

if(mode==="wave"){

x=cx+Math.cos(a)*radius
y=cy+Math.sin(a)*radius+Math.sin(angle+i)*20

}

if(mode==="flower"){

let r=radius*Math.sin(4*a)
x=cx+Math.cos(a)*r
y=cy+Math.sin(a)*r

}

ctx.save()

ctx.translate(x,y)
ctx.rotate(a+Math.PI/2)

ctx.fillText(text,i*text.length%text.length)

ctx.restore()

}

angle+=0.01

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
