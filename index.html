<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>文字聚合成花 · 可变形</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#000;
    overflow:hidden;
    height:100vh;
  }
  .word{
    position:absolute;
    color:#fff;
    font-size:14px;
    user-select:none;
    transition:all 1.4s cubic-bezier(0.34,1.56,0.64,1);
    transform-origin:center;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let w = window.innerWidth;
let h = window.innerHeight;
canvas.width = w;
canvas.height = h;

// 随机文字库
const texts = '花绽放美好温柔希望阳光春天幸福平安喜乐心意'.split('');

// 粒子
class Particle {
  constructor(){
    this.x = Math.random()*w;
    this.y = Math.random()*h;
    this.targetX = this.x;
    this.targetY = this.y;
    this.text = texts[Math.floor(Math.random()*texts.length)];
    this.angle = Math.random()*Math.PI*2;
    this.radius = 0;
    this.time = Math.random()*200;
  }
  update(t){
    this.time += 0.5;
    // 花朵形状：花瓣 + 中心
    const centerX = w/2;
    const centerY = h/2;
    const petalCount = 6;
    const speed = this.time*0.02;

    // 变形参数：呼吸缩放 + 旋转
    const breath = 1 + Math.sin(t*0.0008)*0.2;
    const rotate = t*0.0003;

    const r = 220 * breath;
    const a = this.angle + rotate;

    // 花瓣公式
    const petal = 1 + 0.7*Math.sin(petalCount*a);
    const fx = centerX + r*petal*Math.cos(a);
    const fy = centerY + r*petal*Math.sin(a);

    // 聚拢动画
    this.targetX = fx;
    this.targetY = fy;

    this.x += (this.targetX - this.x)*0.05;
    this.y += (this.targetY - this.y)*0.05;
  }
  draw(){
    ctx.fillStyle = '#fff';
    ctx.font = '14px sans-serif';
    ctx.fillText(this.text, this.x, this.y);
  }
}

const particles = Array.from({length:260},()=>new Particle());

function loop(t){
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0,0,w,h);
  particles.forEach(p=>{
    p.update(t);
    p.draw();
  });
  requestAnimationFrame(loop);
}

loop(0);

window.onresize = ()=>{
  w = window.innerWidth;
  h = window.innerHeight;
  canvas.width = w;
  canvas.height = h;
};
</script>
</body>
</html>
